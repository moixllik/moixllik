<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dvorak | Keyboard</title>
        <style>
            canvas,
            input {
                position: absolute;

                top: 0;
                left: 0;
                bottom: 0;
                right: 0;
            }
            input {
                background: transparent;
                color: cyan;
                outline: none;
                text-align: center;
                font-size: 3em;
                text-shadow: black 3px 0 0;
            }
        </style>
    </head>
    <body>
        <canvas id="canvas"></canvas>
        <input id="input" type="text" />
        <script src="script.js"></script>
    </body>
</html>
